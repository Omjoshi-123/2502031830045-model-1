<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <main>
        <form>
            <label type="text" name="first name">Enter Firstname:</label>
            <input type="text" name="first name" placeholder="Enter First Name" required>
            <br>
            <label type="text" name="last name">Enter Lastname:</label>
            <input type="text" name="lastname" placeholder="Enter Last Name" required>
            <br>
            <label type="email" name="Email">Enter Email:</label>
            <input type="email" name="Email" placeholder="Enter Email" required>
            <br>
            <label type="password" name="password">Enter Password:</label>
            <input type="password" name="password" placeholder="Enter Password" required>
            <br>
            <label type="text" name="description">Enter Decription</label>
            <input type="textarea" name="description" placeholder="Enter Description" required>
            <br>
            <label type="number" name="phone number">Enter Phone Number:</label>
            <input type="number" name="phone number" placeholder="Enter Phone Number" required>
            <br>
            <label type="number" name="landline number">Enter Land Line Number:</label>
            <input type="number" name="landline number" placeholder="Enter Land Line Number" required>
            <br>
            <label type="gender" name="gender">Enter Gender:</label>
            <input type="radio" name="male" required>
            <input type="radio" name="female" required>
            <br>
            <input type="date" name="date of birth" required>
            <br>
            <input type="datetime" name="date and time" required>
            <br>
            <input type="submit" name="submit">
        </form>
    </main>
</body>
</html>
