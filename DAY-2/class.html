<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Class</title>
    <style>
        .p{
            color:red;
            background-color:aqua;
        }
        .h1{
            color:white;
            background-color:black;
        }
        .h2{
            color:darkblue;
            background-color:wheat;
        }
    </style>
</head>
<body>
    <p class="p">
        Welcome to CSS Class
    </p>
    <h1 class="p h1">
        This is class 1
    </h1>
    <h2 class="h2">
        This is class 2
    </h2>
</body>
</html>
