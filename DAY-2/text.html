<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text</title>
    <style>
        div h1{
            text-decoration:underline;
            text-align:center;
            text-transform:capitalize;
            text-shadow:10%;
            color:blue;
            word-spacing: normal;
            letter-spacing: normal;
        }
    </style>
</head>
<body>
    <div>
        <h1>This is Text properties of CSS</h1>
    </div>
</body>
</html>
