<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="a.css" rel="stylesheet">
    <title>Types Of CSS</title>
    <style>
        .H{
            color:red;
        }
    </style>
</head>
<body>
    <!-- inline -->
    <h1 style="color:aqua;">hello</h1>
    <!-- internal -->
    <p class="H">Hello</p>
    <!-- external -->
    <h2 class="a"><em>HELLO</em></h2>
</body>
</html>
