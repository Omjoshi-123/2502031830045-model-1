<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text properties</title>
    <style>
        p{
            text-align:center;
            color:brown
        }
        h1{
            color:green
        }
        div h1{
            color:antiquewhite;
            background-color:aqua;
        }
    </style>
</head>
<body>
    <h1>This is HTML program</h1>
    <p>welcome to HTML and CSS project</p>
    <br>
    <div>
        <h1>
            welcome
        </h1>
    </div>
</body>
</html>
