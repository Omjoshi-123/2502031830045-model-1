<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        body{
            margin:0px;
            padding:0px;
            width:500;
            height:600px;
        }
        .box1{
            margin:0px;
            padding:0px;
            position:absolute;
            background-color:black;
            color:white;
        }
        .box2>h1{
            position:relative;
            background-color:aqua;
        }
        .box3>h1{
            position:fixed;
            background-color:aquamarine;
        }
    </style>
</head>
<body>
    <div class="box1">
        <h1>This is box1</h1>
    </div>
    <div class="box2">
        <h1>This is box2</h1>
    </div>
    <div class="box3">
        <h1>this is box3</h1>
    </div>
</body>
</html>
