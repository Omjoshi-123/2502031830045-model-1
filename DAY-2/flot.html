<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flot</title>
    <style>
        .box1{
            float:left;
            background-color:red;
            height:80px;
            width:300px;
        }
        .box2{
            float:right;
            background-color:blue;
            height:80px;
            width:100px
        }
    </style>
</head>
<body>
    <div class="box1">
        <h1>box 1</h1>
    </div>
    <div class="box2">
        <h1>box 2</h1>
    </div>
</body>
</html>
